<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Golf Buddy - Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #FAFAF8;
  --card: #FFFFFF;
  --border: #E8E6E1;
  --text: #1A1A1A;
  --sub: #6B6B6B;
  --muted: #A0A0A0;
  --green: #2D8C4E;
  --green-light: #E8F5ED;
  --green-dark: #1E6B38;
  --blue: #3478F6;
  --blue-light: #EBF2FF;
  --orange: #E67E22;
  --orange-light: #FFF3E6;
  --red: #E74C3C;
  --red-light: #FDEDEC;
  --yellow: #F4C542;
  --yellow-light: #FFF9E6;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.10);
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans JP', 'DM Sans', sans-serif;
  background: #F0EFEB;
  color: var(--text);
  display: flex;
  justify-content: center;
  align-items: flex-start;
  min-height: 100vh;
  padding: 20px;
}
@media (max-width: 500px) {
  body { padding: 0; background: var(--bg); }
}
.phone {
  width: 390px;
  height: 844px;
  background: var(--bg);
  border-radius: 40px;
  overflow: hidden;
  box-shadow: var(--shadow-lg), 0 0 0 8px #1A1A1A;
  position: relative;
  display: flex;
  flex-direction: column;
}
@media (max-width: 500px) {
  .phone {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    border-radius: 0;
    box-shadow: none;
  }
  .notch { display: none; }
  .status-bar { display: none; }
}
.status-bar {
  height: 54px;
  padding: 14px 28px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  flex-shrink: 0;
}
.status-bar-right { display: flex; gap: 6px; align-items: center; }
.notch {
  width: 126px;
  height: 34px;
  background: #1A1A1A;
  border-radius: 0 0 20px 20px;
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  z-index: 10;
}
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.screen::-webkit-scrollbar { display: none; }
.tab-bar {
  height: 82px;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 8px;
  flex-shrink: 0;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  padding: 4px 0;
  -webkit-tap-highlight-color: transparent;
}
.tab-item svg { width: 26px; height: 26px; }
.tab-item span { font-size: 10px; font-weight: 500; }
.tab-item.active svg { color: var(--green); }
.tab-item.active span { color: var(--green); font-weight: 700; }
.tab-item:not(.active) svg { color: var(--muted); }
.tab-item:not(.active) span { color: var(--muted); }

/* Common */
.page-header {
  padding: 8px 20px 16px;
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
}
.star-row { display: flex; gap: 2px; }
.star { font-size: 18px; cursor: pointer; transition: transform 0.15s; }
.star:hover { transform: scale(1.2); }

/* Review Overlay */
.review-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(4px);
}
.review-modal {
  background: var(--card);
  border-radius: var(--radius);
  padding: 28px 24px;
  width: 100%;
  max-width: 350px;
  box-shadow: var(--shadow-lg);
}
.review-modal h3 {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 4px;
}
.review-modal .sub { font-size: 13px; color: var(--sub); margin-bottom: 20px; }
.review-user {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: var(--bg);
  border-radius: 12px;
  margin-bottom: 12px;
}
.review-user .avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.review-stars { display: flex; gap: 6px; justify-content: center; margin: 16px 0; }
.review-stars .star { font-size: 36px; }
.review-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.review-tag {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--card);
  cursor: pointer;
  transition: all 0.2s;
}
.review-tag.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: var(--green);
}
.review-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}
.review-btn.primary { background: var(--green); color: #fff; }
.review-btn.primary:hover { background: var(--green-dark); }
.review-btn.disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

/* Popup blocker */
.blocker-popup {
  position: absolute;
  bottom: 82px; left: 12px; right: 12px;
  background: var(--card);
  border-radius: 16px;
  padding: 16px 20px;
  box-shadow: var(--shadow-lg);
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 2px solid var(--orange);
  animation: slideUp 0.3s ease;
}
@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
</style>
</head>
<body>
<div class="phone" id="app"></div>

<script>
/* ===== STATE ===== */
const state = {
  tab: 'home',
  screen: 'home',
  reviewPending: false,
  reviewDone: {},
  reviewTarget: null,
  reviewStars: {},
  reviewTags: {},
  blockerVisible: false,
  selectedRound: null,
  chatOpen: null,
  messageInput: '',
  createStep: 'select',
  createType: null,
  createDateType: 'fixed',
  createSpots: 3,
  filterCourse: 'all',
  filterScale: 'all',
};

const roundUsers = [
  { id: 'u1', name: '田中 健太', age: 28, score: '105〜115', avatar: '🧑', color: '#3478F6', reviews: 12, rating: 4.3, style: 'のんびり派', freq: '月2回', area: '神奈川' },
  { id: 'u2', name: '佐藤 美咲', age: 32, score: '110〜120', avatar: '👩', color: '#E67E22', reviews: 8, rating: 4.6, style: 'エンジョイ派', freq: '月1回', area: '神奈川' },
  { id: 'u3', name: '鈴木 大輔', age: 35, score: '95〜105', avatar: '👨', color: '#2D8C4E', reviews: 23, rating: 4.8, style: 'サクサク派', freq: '月3回', area: '東京' },
];

const rounds = [
  { id: 'r1', host: roundUsers[2], title: '初心者歓迎！のんびりラウンド', type: 'confirmed', courseName: '湘南カントリークラブ', dateType: 'fixed', date: '5/10（土）', time: '8:30 スタート', area: '神奈川県西部', maxSpots: 4, currentApplicants: 2, level: '初心者OK', price: '¥8,000〜', applicants: [roundUsers[0]] },
  { id: 'r2', host: roundUsers[0], title: '平日ゆるラウンド（コース未定）', type: 'flexible', dateType: 'range', dateRange: '5月の平日どこか', date: '5月の平日', time: '9:00 スタート', area: '千葉県', maxSpots: 4, currentApplicants: 1, level: 'スコア不問', price: '¥6,500〜', applicants: [] },
  { id: 'r3', host: roundUsers[1], title: '女性歓迎☀️ エンジョイゴルフ', type: 'confirmed', courseName: '埼玉国際ゴルフ倶楽部', dateType: 'fixed', date: '5/17（土）', time: '7:30 スタート', area: '埼玉県', maxSpots: 4, currentApplicants: 3, level: '120以下', price: '¥9,000〜', applicants: [roundUsers[2]] },
  { id: 'r4', host: roundUsers[2], title: '🏆 春のメンバーコンペ2026', type: 'confirmed', courseName: '富士見高原ゴルフコース', dateType: 'fixed', date: '5/24（土）', time: '7:00 スタート', area: '山梨県', maxSpots: 20, currentApplicants: 12, level: 'スコア不問', price: '¥12,000〜（コンペフィー込）', applicants: [roundUsers[0], roundUsers[1]] },
];

const buddies = [roundUsers[2]];

const messages = {
  'u3': [
    { from: 'u3', text: '先日はありがとうございました！楽しかったです', time: '5/3 18:20' },
    { from: 'me', text: 'こちらこそ！またぜひ行きましょう', time: '5/3 18:35' },
    { from: 'u3', text: '来月あたりどうですか？神奈川で探してみます', time: '5/4 10:12' },
  ]
};

/* ===== RENDER ===== */
function render() {
  const app = document.getElementById('app');
  app.innerHTML = `
    ${renderNotch()}
    ${renderStatusBar()}
    <div class="screen">${renderScreen()}</div>
    ${state.blockerVisible ? renderBlocker() : ''}
    ${state.reviewPending && state.reviewTarget ? renderReviewOverlay() : ''}
    ${renderTabBar()}
  `;
  bindEvents();
}

function renderNotch() {
  return '<div class="notch"></div>';
}

function renderStatusBar() {
  return `<div class="status-bar">
    <span>9:41</span>
    <div class="status-bar-right">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="currentColor"/><rect x="4.5" y="4" width="3" height="8" rx="1" fill="currentColor"/><rect x="9" y="1" width="3" height="11" rx="1" fill="currentColor"/><rect x="13.5" y="0" width="2.5" height="12" rx="1" fill="currentColor" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 3C10.7 3 13.1 4.2 14.7 6.1L16 4.6C14 2.3 11.2 0.8 8 0.8S2 2.3 0 4.6L1.3 6.1C2.9 4.2 5.3 3 8 3Z" fill="currentColor"/><path d="M8 7C9.7 7 11.2 7.7 12.3 8.9L13.6 7.4C12.1 5.9 10.2 5 8 5S3.9 5.9 2.4 7.4L3.7 8.9C4.8 7.7 6.3 7 8 7Z" fill="currentColor"/><circle cx="8" cy="11" r="1.5" fill="currentColor"/></svg>
      <svg width="27" height="12" viewBox="0 0 27 12"><rect x="0" y="1" width="23" height="10" rx="3" stroke="currentColor" stroke-width="1.2" fill="none"/><rect x="24" y="4" width="2" height="4" rx="1" fill="currentColor" opacity="0.4"/><rect x="1.5" y="2.5" width="18" height="7" rx="1.5" fill="currentColor"/></svg>
    </div>
  </div>`;
}

function renderTabBar() {
  const tabs = [
    { id: 'home', label: 'ホーム', icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>` },
    { id: 'search', label: 'さがす', icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>` },
    { id: 'create', label: '募集する', icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>` },
    { id: 'buddies', label: 'ゴル友', icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>` },
    { id: 'mypage', label: 'マイページ', icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>` },
  ];
  return `<div class="tab-bar">${tabs.map(t => `
    <div class="tab-item ${state.tab === t.id ? 'active' : ''}" data-tab="${t.id}">
      ${t.icon}<span>${t.label}</span>
    </div>`).join('')}</div>`;
}

function renderScreen() {
  if (state.screen === 'round-detail') return renderRoundDetail();
  if (state.screen === 'chat') return renderChat();
  if (state.screen === 'profile-view') return renderProfileView();
  switch(state.tab) {
    case 'home': return renderHome();
    case 'search': return renderSearch();
    case 'create': return renderCreate();
    case 'buddies': return renderBuddies();
    case 'mypage': return renderMyPage();
    default: return renderHome();
  }
}

/* ===== HOME ===== */
function renderHome() {
  return `
    <div class="page-header">ホーム</div>
    <div style="padding:0 20px 12px">
      <div style="background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
          <div style="width:52px;height:52px;border-radius:50%;background:var(--green-light);display:flex;align-items:center;justify-content:center;font-size:26px">⛳</div>
          <div>
            <div style="font-size:17px;font-weight:900">Wataru</div>
            <div style="font-size:12px;color:var(--sub)">30代 ・ スコア 105〜115 ・ 神奈川</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:900;color:var(--green)">4.5</div>
            <div style="font-size:10px;color:var(--muted)">レビュー平均</div>
          </div>
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:900;color:var(--blue)">7</div>
            <div style="font-size:10px;color:var(--muted)">ラウンド回数</div>
          </div>
          <div style="flex:1;background:var(--bg);border-radius:10px;padding:10px;text-align:center">
            <div style="font-size:22px;font-weight:900;color:var(--orange)">3</div>
            <div style="font-size:10px;color:var(--muted)">ゴル友</div>
          </div>
        </div>
      </div>
    </div>

    <div style="padding:0 20px">
      <div style="font-size:16px;font-weight:900;margin-bottom:12px">📋 新着ラウンド募集</div>
      ${rounds.map(r => renderRoundCard(r)).join('')}
    </div>

    <div style="padding:20px">
      <div style="font-size:16px;font-weight:900;margin-bottom:12px">⭐ レビューをシミュレーション</div>
      <button onclick="triggerReview()" style="width:100%;padding:14px;background:var(--orange);color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer">
        レビュー強制ポップアップを体験する
      </button>
      <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center">※ラウンド日時経過後に表示されるレビュー画面のデモ</div>
    </div>
    <div style="height:20px"></div>
  `;
}

function renderRoundCard(r) {
  const isComp = r.maxSpots >= 5;
  const remaining = r.maxSpots - r.currentApplicants;
  const progressPct = Math.round((r.currentApplicants / r.maxSpots) * 100);
  const typeBadge = r.type === 'confirmed'
    ? `<span class="badge" style="background:var(--green-light);color:var(--green)">✅ コース確定</span>`
    : `<span class="badge" style="background:#EFEFEC;color:var(--sub)">📍 コース未定</span>`;
  const dateLabel = r.dateType === 'range' ? r.dateRange : r.date;
  const placeLabel = r.type === 'confirmed' ? r.courseName : r.area;
  const placeIcon = r.type === 'confirmed' ? '⛳' : '📍';
  const cardBorder = isComp ? 'border-left:4px solid var(--orange);' : '';

  return `
    <div data-round="${r.id}" style="background:var(--card);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;${cardBorder}">
      ${isComp ? `<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><span class="badge" style="background:var(--orange);color:#fff">🏆 コンペ・イベント</span></div>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px">
        <div style="font-size:15px;font-weight:700;flex:1">${r.title}</div>
        ${!isComp ? `<span class="badge" style="background:var(--green-light);color:var(--green);flex-shrink:0">残り${remaining}枠</span>` : ''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        ${typeBadge}
        <span class="badge" style="background:var(--bg);color:var(--sub)">📅 ${dateLabel}</span>
        ${r.dateType === 'fixed' ? `<span class="badge" style="background:var(--bg);color:var(--sub)">⏰ ${r.time}</span>` : ''}
        <span class="badge" style="background:var(--bg);color:var(--sub)">${placeIcon} ${placeLabel}</span>
      </div>
      ${isComp ? `
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
            <span style="font-size:11px;color:var(--sub);font-weight:600">参加状況</span>
            <span style="font-size:14px;font-weight:900;color:var(--orange)">${r.currentApplicants}/${r.maxSpots}人 参加中</span>
          </div>
          <div style="width:100%;height:8px;background:var(--bg);border-radius:4px;overflow:hidden">
            <div style="width:${progressPct}%;height:100%;background:var(--orange);border-radius:4px"></div>
          </div>
        </div>
      ` : ''}
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px">
        <span class="badge" style="background:var(--blue-light);color:var(--blue)">${r.level}</span>
        <span class="badge" style="background:var(--yellow-light);color:var(--orange)">${r.price}</span>
      </div>
      <div style="display:flex;align-items:center;gap:8px;padding-top:10px;border-top:1px solid var(--border)">
        <div style="width:28px;height:28px;border-radius:50%;background:${r.host.color}22;display:flex;align-items:center;justify-content:center;font-size:14px">${r.host.avatar}</div>
        <div style="font-size:12px;font-weight:600">${r.host.name}</div>
        <div style="font-size:11px;color:var(--muted)">★${r.host.rating}（${r.host.reviews}件）</div>
      </div>
    </div>`;
}

/* ===== ROUND DETAIL ===== */
function renderRoundDetail() {
  const r = rounds.find(x => x.id === state.selectedRound);
  if (!r) return '';
  return `
    <div style="padding:12px 20px">
      <div data-action="back" style="display:inline-flex;align-items:center;gap:4px;font-size:14px;color:var(--blue);cursor:pointer;margin-bottom:16px;font-weight:600">← 戻る</div>
      <div style="background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)">
        <div style="font-size:20px;font-weight:900;margin-bottom:16px">${r.title}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">日時</div><div style="font-size:14px;font-weight:700">${r.date} ${r.time}</div></div>
          <div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">エリア</div><div style="font-size:14px;font-weight:700">${r.area}</div></div>
          <div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">レベル</div><div style="font-size:14px;font-weight:700">${r.level}</div></div>
          <div style="background:var(--bg);border-radius:10px;padding:12px"><div style="font-size:10px;color:var(--muted);margin-bottom:4px">費用目安</div><div style="font-size:14px;font-weight:700">${r.price}</div></div>
        </div>

        <div style="margin-bottom:16px">
          <div style="font-size:13px;font-weight:700;margin-bottom:8px">主催者</div>
          <div data-profile="${r.host.id}" style="display:flex;align-items:center;gap:10px;padding:12px;background:var(--bg);border-radius:12px;cursor:pointer">
            <div style="width:44px;height:44px;border-radius:50%;background:${r.host.color}22;display:flex;align-items:center;justify-content:center;font-size:22px">${r.host.avatar}</div>
            <div style="flex:1">

/* ===== REVIEW OVERLAY ===== */
function renderReviewOverlay() {
  const target = state.reviewTarget;
  const u = roundUsers.find(x => x.id === target);
  if (!u) return '';
  const stars = state.reviewStars[target] || 0;
  const tags = state.reviewTags[target] || [];
  const allTags = ['マナーが良い','テンポが良い','初心者に優しい','会話が楽しい','時間に正確','また回りたい','ドタキャン','マナーが悪い'];
  const canSubmit = stars > 0;

  return `<div class="review-overlay">
    <div class="review-modal">
      <h3>ラウンドレビュー</h3>
      <div class="sub">5/3のラウンドはいかがでしたか？</div>
      <div class="review-user">
        <div class="avatar" style="background:${u.color}22;font-size:22px">${u.avatar}</div>
        <div>
          <div style="font-size:14px;font-weight:700">${u.name}</div>
          <div style="font-size:11px;color:var(--sub)">${u.age}歳 ・ ${u.score}</div>
        </div>
      </div>

      <div style="text-align:center;margin-bottom:4px;font-size:12px;color:var(--sub)">総合評価</div>
      <div class="review-stars">
        ${[1,2,3,4,5].map(n => `<span class="star" data-star="${n}" data-target="${target}" style="color:${n<=stars?'var(--yellow)':'var(--border)'};cursor:pointer">${n<=stars?'★':'☆'}</span>`).join('')}
      </div>
      ${stars > 0 ? `<div style="text-align:center;font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px">${['','もう少し...','普通','良い！','とても良い！','最高！'][stars]}</div>` : ''}

      <div style="font-size:12px;color:var(--sub);margin-bottom:8px">タグ（任意）</div>
      <div class="review-tags">
        ${allTags.map(t => `<span class="review-tag ${tags.includes(t)?'selected':''}" data-tag="${t}" data-target="${target}">${t}</span>`).join('')}
      </div>

      <div style="margin-bottom:16px">
        <div style="font-size:12px;color:var(--sub);margin-bottom:6px">コメント（任意）</div>
        <textarea placeholder="一緒にラウンドした感想を書いてください" style="width:100%;height:60px;padding:10px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;resize:none;font-family:inherit;outline:none;background:var(--bg)"></textarea>
      </div>

      <button class="review-btn ${canSubmit?'primary':'disabled'}" ${canSubmit?`onclick="submitReview('${target}')"`:'disabled'}>
        ${canSubmit?'レビューを送信する':'★をタップして評価してください'}
      </button>
    </div>
  </div>`;
}

/* ===== BLOCKER POPUP ===== */
function renderBlocker() {
  return `<div class="blocker-popup">
    <div style="font-size:24px">⚠️</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700;color:var(--orange)">未完了のレビューがあります</div>
      <div style="font-size:11px;color:var(--sub);margin-top:2px">レビューを完了するまで他の機能は使えません</div>
    </div>
    <button onclick="openReview()" style="padding:8px 14px;background:var(--orange);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0">レビューする</button>
  </div>`;
}

/* ===== ACTIONS ===== */
function triggerReview() {
  state.reviewPending = true;
  state.reviewTarget = 'u1';
  state.reviewStars = {};
  state.reviewTags = {};
  state.blockerVisible = false;
  render();
}

function openReview() {
  state.reviewTarget = 'u1';
  state.blockerVisible = false;
  render();
}

function submitReview(target) {
  state.reviewDone[target] = true;
  const remaining = ['u1','u2'].filter(id => !state.reviewDone[id]);
  if (remaining.length > 0) {
    state.reviewTarget = remaining[0];
  } else {
    state.reviewPending = false;
    state.reviewTarget = null;
    state.blockerVisible = false;
    state.tab = 'home';
    state.screen = 'home';
  }
  render();
}

/* ===== EVENTS ===== */
function bindEvents() {
  document.querySelectorAll('.tab-item').forEach(el => {
    el.addEventListener('click', () => {
      const tab = el.dataset.tab;
      if (state.reviewPending && !state.reviewTarget) {
        state.blockerVisible = true;
        render();
        return;
      }
      state.tab = tab;
      state.screen = tab;
      state.blockerVisible = false;
      if (tab === 'create') {
        state.createStep = 'select';
        state.createType = null;
      }
      render();
    });
  });

  document.querySelectorAll('[data-round]').forEach(el => {
    el.addEventListener('click', () => {
      state.selectedRound = el.dataset.round;
      state.screen = 'round-detail';
      render();
    });
  });

  document.querySelectorAll('[data-action="back"]').forEach(el => {
    el.addEventListener('click', () => {
      state.screen = state.tab;
      render();
    });
  });

  document.querySelectorAll('[data-action="back-to-select"]').forEach(el => {
    el.addEventListener('click', () => {
      state.createStep = 'select';
      state.createType = null;
      render();
    });
  });

  document.querySelectorAll('[data-create-type]').forEach(el => {
    el.addEventListener('click', () => {
      state.createType = el.dataset.createType;
      state.createStep = 'form';
      state.createSpots = 3;
      state.createDateType = 'fixed';
      render();
    });
  });

  document.querySelectorAll('[data-date-toggle]').forEach(el => {
    el.addEventListener('click', () => {
      state.createDateType = el.dataset.dateToggle;
      render();
    });
  });

  document.querySelectorAll('[data-spots]').forEach(el => {
    el.addEventListener('click', () => {
      state.createSpots = parseInt(el.dataset.spots);
      render();
    });
  });

  const spotsInput = document.getElementById('spotsInput');
  if (spotsInput) {
    spotsInput.addEventListener('change', () => {
      let v = parseInt(spotsInput.value) || 1;
      if (v < 1) v = 1;
      if (v > 50) v = 50;
      state.createSpots = v;
      render();
    });
  }

  document.querySelectorAll('[data-filter-course]').forEach(el => {
    el.addEventListener('click', () => {
      state.filterCourse = el.dataset.filterCourse;
      render();
    });
  });

  document.querySelectorAll('[data-filter-scale]').forEach(el => {
    el.addEventListener('click', () => {
      state.filterScale = el.dataset.filterScale;
      render();
    });
  });

  document.querySelectorAll('[data-chat]').forEach(el => {
    el.addEventListener('click', () => {
      state.chatOpen = el.dataset.chat;
      state.screen = 'chat';
      render();
    });
  });

  document.querySelectorAll('[data-profile]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      state.profileView = el.dataset.profile;
      state.screen = 'profile-view';
      render();
    });
  });

  document.querySelectorAll('[data-star]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const target = el.dataset.target;
      const star = parseInt(el.dataset.star);
      state.reviewStars[target] = star;
      render();
    });
  });

  document.querySelectorAll('[data-tag]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const target = el.dataset.target;
      const tag = el.dataset.tag;
      if (!state.reviewTags[target]) state.reviewTags[target] = [];
      const idx = state.reviewTags[target].indexOf(tag);
      if (idx >= 0) state.reviewTags[target].splice(idx, 1);
      else state.reviewTags[target].push(tag);
      render();
    });
  });
}

/* ===== INIT ===== */
render();
</script>
</body>
</html>
